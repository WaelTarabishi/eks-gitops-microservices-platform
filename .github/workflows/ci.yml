name: Boutique CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - projects/boutique-microservices/**

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          ALL_SERVICES=(auth gateway orders order-service product-service user-service frontend)

          add_service() {
            local service="$1"

            for existing in "${SELECTED_SERVICES[@]:-}"; do
              if [[ "$existing" == "$service" ]]; then
                return
              fi
            done

            SELECTED_SERVICES+=("$service")
          }

          SELECTED_SERVICES=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SELECTED_SERVICES=("${ALL_SERVICES[@]}")
          else
            BEFORE_SHA="${{ github.event.before }}"
            CURRENT_SHA="${{ github.sha }}"

            if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t CHANGED_FILES < <(git show --pretty="" --name-only "$CURRENT_SHA")
            else
              mapfile -t CHANGED_FILES < <(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")
            fi

            for file in "${CHANGED_FILES[@]}"; do
              case "$file" in
                projects/boutique-microservices/frontend/*)
                  add_service "frontend"
                  ;;
                projects/boutique-microservices/backend/services/auth/*)
                  add_service "auth"
                  ;;
                projects/boutique-microservices/backend/services/gateway/*)
                  add_service "gateway"
                  ;;
                projects/boutique-microservices/backend/services/orders/*)
                  add_service "orders"
                  ;;
                projects/boutique-microservices/backend/services/order-service/*)
                  add_service "order-service"
                  ;;
                projects/boutique-microservices/backend/services/product-service/*)
                  add_service "product-service"
                  ;;
                projects/boutique-microservices/backend/services/user-service/*)
                  add_service "user-service"
                  ;;
              esac
            done
          fi

          if [[ ${#SELECTED_SERVICES[@]} -eq 0 ]]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVICES_JSON=$(printf '%s\n' "${SELECTED_SERVICES[@]}" | jq -R . | jq -sc .)
          echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com
     
      - name: Build Docker Image
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/${{ matrix.service }}"
          fi

          echo "Building from $BUILD_PATH"

          docker build \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG \
          $BUILD_PATH


      - name: Push Docker Image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ matrix.service }}:${{ github.sha }}
          echo "Pushing $IMAGE_URI"
          docker push $IMAGE_URI

  update-manifests:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-and-push
    if: needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in k8s manifests
        shell: bash
        run: |
          set -euo pipefail

          NEW_TAG=${{ github.sha }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}
          SERVICES='${{ needs.detect-changes.outputs.services }}'

          while IFS= read -r SERVICE; do
            if [[ "$SERVICE" == "frontend" ]]; then
              MANIFEST="gitops/k8s/frontend/deployment.yml"
            else
              MANIFEST="gitops/k8s/backend/${SERVICE}.yml"
            fi

            sed -Ei "s|(^[[:space:]]*image:[[:space:]]*).*$|\\1${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:${NEW_TAG}|g" "$MANIFEST"
          done < <(echo "$SERVICES" | jq -r '.[]')

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push

