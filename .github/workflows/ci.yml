name: Boutique CI Pipeline

on:
  workflow_dispatch:
    inputs:
      rebuild_scope:
        description: "Choose how many services to rebuild"
        required: true
        default: all
        type: choice
        options:
          - all
          - selected
      selected_services:
        description: "Comma-separated services when rebuild_scope=selected"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - projects/boutique-microservices/frontend/**
      - projects/boutique-microservices/backend/services/**
      - projects/boutique-microservices/backend/shared/**
      - projects/boutique-microservices/shared/**

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  detect-changes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          ALL_SERVICES=(auth gateway orders order-service product-service user-service frontend)
          REBUILD_SCOPE="${{ github.event.inputs.rebuild_scope }}"
          SELECTED_INPUT="${{ github.event.inputs.selected_services }}"

          add_service() {
            local service="$1"

            for existing in "${SELECTED_SERVICES[@]:-}"; do
              if [[ "$existing" == "$service" ]]; then
                return
              fi
            done

            SELECTED_SERVICES+=("$service")
          }

          SELECTED_SERVICES=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "$REBUILD_SCOPE" == "selected" ]]; then
              IFS=',' read -ra REQUESTED_SERVICES <<< "$SELECTED_INPUT"

              for raw_service in "${REQUESTED_SERVICES[@]}"; do
                service="$(echo "$raw_service" | xargs)"

                if [[ -z "$service" ]]; then
                  continue
                fi

                if [[ ! " ${ALL_SERVICES[*]} " =~ " ${service} " ]]; then
                  echo "Unsupported service requested: $service"
                  exit 1
                fi

                add_service "$service"
              done

              if [[ ${#SELECTED_SERVICES[@]} -eq 0 ]]; then
                echo "No services were provided for rebuild_scope=selected"
                exit 1
              fi
            else
              SELECTED_SERVICES=("${ALL_SERVICES[@]}")
            fi
          else
            BEFORE_SHA="${{ github.event.before }}"
            CURRENT_SHA="${{ github.sha }}"

            if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t CHANGED_FILES < <(git show --pretty="" --name-only "$CURRENT_SHA")
            else
              mapfile -t CHANGED_FILES < <(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")
            fi

            for file in "${CHANGED_FILES[@]}"; do
              case "$file" in
                *.md)
                  continue
                  ;;
                projects/boutique-microservices/frontend/*)
                  add_service "frontend"
                  ;;
                projects/boutique-microservices/backend/services/auth/*)
                  add_service "auth"
                  ;;
                projects/boutique-microservices/backend/services/gateway/*)
                  add_service "gateway"
                  ;;
                projects/boutique-microservices/backend/services/orders/*)
                  add_service "orders"
                  ;;
                projects/boutique-microservices/backend/services/order-service/*)
                  add_service "order-service"
                  ;;
                projects/boutique-microservices/backend/services/product-service/*)
                  add_service "product-service"
                  ;;
                projects/boutique-microservices/backend/services/user-service/*)
                  add_service "user-service"
                  ;;
                projects/boutique-microservices/backend/shared/*|projects/boutique-microservices/shared/*)
                  for service in "${ALL_SERVICES[@]}"; do
                    add_service "$service"
                  done
                  ;;
              esac
            done
          fi

          if [[ ${#SELECTED_SERVICES[@]} -eq 0 ]]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERVICES_JSON=$(printf '%s\n' "${SELECTED_SERVICES[@]}" | jq -R . | jq -sc .)
          echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  prepare-release:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.prepare.outputs.services }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare per-service release metadata
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          bump_patch() {
            local version="$1"
            local major minor patch

            IFS='.' read -r major minor patch <<< "$version"
            echo "${major}.${minor}.$((patch + 1))"
          }

          SHORT_SHA="${GITHUB_SHA::7}"
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          RELEASES=()

          while IFS= read -r SERVICE; do
            if [[ "$SERVICE" == "frontend" ]]; then
              PACKAGE_JSON="projects/boutique-microservices/frontend/package.json"
              BUILD_PATH="projects/boutique-microservices/frontend"
              MANIFEST="gitops/k8s/frontend/deployment.yml"
            else
              PACKAGE_JSON="projects/boutique-microservices/backend/services/${SERVICE}/package.json"
              BUILD_PATH="projects/boutique-microservices/backend/services/${SERVICE}"
              MANIFEST="gitops/k8s/backend/${SERVICE}.yml"
            fi

            CURRENT_VERSION=$(jq -r '.version' "$PACKAGE_JSON")
            NEXT_VERSION=$(bump_patch "$CURRENT_VERSION")
            IMAGE_TAG="${NEXT_VERSION}-${SHORT_SHA}"

            RELEASES+=("$(jq -nc \
              --arg service "$SERVICE" \
              --arg package_json "$PACKAGE_JSON" \
              --arg build_path "$BUILD_PATH" \
              --arg manifest "$MANIFEST" \
              --arg version "$NEXT_VERSION" \
              --arg image_tag "$IMAGE_TAG" \
              '{service: $service, package_json: $package_json, build_path: $build_path, manifest: $manifest, version: $version, image_tag: $image_tag}')")
          done < <(echo "$SERVICES" | jq -r '.[]')

          RELEASES_JSON=$(printf '%s\n' "${RELEASES[@]}" | jq -sc .)
          echo "services=$RELEASES_JSON" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare-release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.prepare-release.outputs.services) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ matrix.service.service }}:${{ matrix.service.image_tag }}
          echo "Building $IMAGE_URI from ${{ matrix.service.build_path }}"

          docker build \
            -t "$IMAGE_URI" \
            "${{ matrix.service.build_path }}"

      - name: Push Docker image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ matrix.service.service }}:${{ matrix.service.image_tag }}
          echo "Pushing $IMAGE_URI"
          docker push "$IMAGE_URI"

  update-manifests:
    needs:
      - prepare-release
      - build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package versions and image tags
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}
          SERVICES='${{ needs.prepare-release.outputs.services }}'

          while IFS= read -r ENTRY; do
            SERVICE=$(echo "$ENTRY" | jq -r '.service')
            PACKAGE_JSON=$(echo "$ENTRY" | jq -r '.package_json')
            MANIFEST=$(echo "$ENTRY" | jq -r '.manifest')
            VERSION=$(echo "$ENTRY" | jq -r '.version')
            IMAGE_TAG=$(echo "$ENTRY" | jq -r '.image_tag')

            TMP_FILE=$(mktemp)
            jq --arg version "$VERSION" '.version = $version' "$PACKAGE_JSON" > "$TMP_FILE"
            mv "$TMP_FILE" "$PACKAGE_JSON"

            sed -Ei "s|(^[[:space:]]*image:[[:space:]]*).*$|\\1${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${SERVICE}:${IMAGE_TAG}|g" "$MANIFEST"
          done < <(echo "$SERVICES" | jq -c '.[]')

      - name: Commit and push release updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/ projects/boutique-microservices/
          git diff --staged --quiet || git commit -m "ci: update service versions and image tags [skip ci]"
          git push
